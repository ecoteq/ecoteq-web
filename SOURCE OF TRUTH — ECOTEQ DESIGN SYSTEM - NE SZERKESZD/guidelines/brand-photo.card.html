<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans)}
  .hero{position:relative;height:240px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:26px}
  .bg{position:absolute;inset:0;background:repeating-linear-gradient(115deg,#3a4a5a 0 22px,#33424f 22px 44px)}
  .ov{position:absolute;inset:0;background:var(--overlay-navy)}
  .c{position:relative;z-index:1;color:#fff}
  .tag{display:inline-flex;align-items:center;background:var(--ecoteq-green);color:#fff;font-size:10px;font-weight:var(--fw-bold);letter-spacing:.14em;padding:6px 14px;border-radius:var(--radius-pill);text-transform:uppercase;margin-bottom:12px}
  .h{font-size:38px;font-weight:var(--fw-extrabold);line-height:1;letter-spacing:-.02em;margin:0}
</style></head>
<body style="background-color: rgba(0, 0, 0, 0)">
  <div class="hero">
    <div class="bg"></div><div class="ov"></div>
    <div class="c">
      <span class="tag">Ipari darálás</span>
      <h2 class="h">Robusztus, megtérülő<br>shredder rendszerek</h2>
    </div>
  </div>
</body></html>
