<!-- @dsCard group="01 · Brand" viewport="700x220" name="Logo lockups" subtitle="Mark + wordmark on navy, white and color" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{display:flex;align-items:center;gap:16px;padding:26px 28px}
  .wm{font-weight:var(--fw-extrabold);font-size:30px;letter-spacing:.06em}
  .on-navy{background:var(--ecoteq-navy)}
  .on-navy .wm{color:#fff}
  .on-white .wm{color:var(--ecoteq-navy)}
  .on-light{background:var(--gray-100)}
  .on-light .wm{color:var(--ecoteq-navy)}
  .on-green{background:var(--ecoteq-green)}
  .on-green .wm{color:#fff}
</style></head>
<body>
  <div class="grid">
    <div class="cell on-navy"><img src="../assets/logo-mark-white.svg" height="46"><span class="wm">ECOTEQ</span></div>
    <div class="cell on-white"><img src="../assets/logo-mark-navy.svg" height="46"><span class="wm">ECOTEQ</span></div>
    <div class="cell on-light"><img src="../assets/logo-mark-green.svg" height="46"><span class="wm">ECOTEQ</span></div>
    <div class="cell on-green"><img src="../assets/logo-mark-mono-white.svg" height="46"><span class="wm">ECOTEQ</span></div>
  </div>
</body></html>
