<!-- @dsCard group="02 · Colors" viewport="700x150" name="Status colors" subtitle="Success, warning, danger, info" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:20px;background:#fff}
  .row{display:flex;gap:14px}
  .sw{flex:1;display:flex;align-items:center;gap:10px}
  .dot{width:34px;height:34px;border-radius:var(--radius-pill);flex:none}
  .name{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--color-text)}
  .hex{font-size:10px;color:var(--color-text-secondary)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:var(--color-success)"></div><div><div class="name">Success</div><div class="hex">#43AD4D</div></div></div>
    <div class="sw"><div class="dot" style="background:var(--color-warning)"></div><div><div class="name">Warning</div><div class="hex">#D98A1F</div></div></div>
    <div class="sw"><div class="dot" style="background:var(--color-danger)"></div><div><div class="name">Danger</div><div class="hex">#C0392B</div></div></div>
    <div class="sw"><div class="dot" style="background:var(--color-info)"></div><div><div class="name">Info</div><div class="hex">#355D82</div></div></div>
  </div>
</body></html>
