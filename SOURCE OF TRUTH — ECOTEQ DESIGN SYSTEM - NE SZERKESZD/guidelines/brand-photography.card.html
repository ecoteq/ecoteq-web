<!DOCTYPE html><html lang="hu"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
  .ph{position:relative;height:140px;border-radius:var(--radius-md);overflow:hidden}
  .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .ov{position:absolute;inset:0;background:var(--overlay-navy)}
  .cap{position:absolute;left:10px;bottom:9px;z-index:1;color:#fff;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
</style></head>
<body>
  <div class="grid">
    <div class="ph"><img src="../assets/photos/hero-briquette-plant.jpg"><div class="ov"></div><span class="cap">Brikettüzem</span></div>
    <div class="ph"><img src="../assets/photos/biomass-belt-dryer.png"><div class="ov"></div><span class="cap">Szárítás</span></div>
    <div class="ph"><img src="../assets/photos/service-installation.png"><div class="ov"></div><span class="cap">Telepítés</span></div>
    <div class="ph"><img src="../assets/photos/shredder.png"><div class="ov"></div><span class="cap">Darálás</span></div>
    <div class="ph"><img src="../assets/photos/vacuum-kiln.png"><div class="ov"></div><span class="cap">Vákuum</span></div>
    <div class="ph"><img src="../assets/photos/pelletizing-line.png"><div class="ov"></div><span class="cap">Pelletálás</span></div>
  </div>
</body></html>
