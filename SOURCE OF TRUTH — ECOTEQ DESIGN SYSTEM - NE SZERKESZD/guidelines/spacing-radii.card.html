<!-- @dsCard group="04 · Spacing" viewport="700x160" name="Radii" subtitle="Gentle cards; signature pill for CTAs & chips" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:22px;background:#fff;color:var(--color-text)}
  .row{display:flex;gap:16px;align-items:flex-end}
  .c{text-align:center}
  .box{width:78px;height:60px;background:var(--ecoteq-navy)}
  .l{margin-top:7px;font-size:10px;color:var(--color-text-secondary);font-weight:var(--fw-bold)}
  .pill{width:120px;height:44px;background:var(--ecoteq-green);border-radius:var(--radius-pill);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:var(--fw-bold);letter-spacing:.1em}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="l">sm · 4</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-md)"></div><div class="l">md · 8</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="l">lg · 14</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="l">xl · 22</div></div>
    <div class="c"><div class="pill">PILL</div><div class="l">pill · 999</div></div>
  </div>
</body></html>
