<!-- @dsCard group="04 · Spacing" viewport="700x180" name="Shadows" subtitle="Cool navy-tinted elevation + green CTA lift" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:28px 22px;background:var(--gray-50);color:var(--color-text)}
  .row{display:flex;gap:22px}
  .c{text-align:center}
  .box{width:96px;height:64px;background:#fff;border-radius:var(--radius-lg)}
  .l{margin-top:10px;font-size:10px;color:var(--color-text-secondary);font-weight:var(--fw-bold)}
  .accent{background:var(--ecoteq-green)}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="l">xs</div></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="l">sm</div></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="l">md</div></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="l">lg</div></div>
    <div class="c"><div class="box accent" style="box-shadow:var(--shadow-accent)"></div><div class="l">accent</div></div>
  </div>
</body></html>
