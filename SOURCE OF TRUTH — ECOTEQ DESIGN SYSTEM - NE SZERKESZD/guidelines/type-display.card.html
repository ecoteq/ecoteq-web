<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:22px;background:#fff;color:var(--color-text)}
  .disp{font-weight:var(--fw-extrabold);font-size:60px;line-height:.98;letter-spacing:-.02em}
  .disp .g{color:var(--color-accent)}
  .meta{margin-top:10px;font-size:11px;color:var(--color-text-secondary);letter-spacing:.04em}
  .wm{margin-top:18px;display:flex;align-items:center;gap:14px}
  .wm span{font-weight:var(--fw-extrabold);font-size:30px;letter-spacing:.06em}
</style></head>
<body>
  <div class="disp">Ipari <span class="g">megtérülés</span></div>
  <div class="meta">Display · 800 ExtraBold · letter-spacing −0.02em · árvíztűrő tükörfúrógép</div>
  <div class="wm"><img src="../assets/logo-mark-navy.svg" height="40"><span>ECOTEQ</span></div>
</body></html>
