<!-- @dsCard group="05 · Components" viewport="700x320" name="Brand" subtitle="Logo, overline, section heading, contact pills" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-50);padding:24px;color:var(--color-text)}
  .group{margin-bottom:20px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:10px}
  .row{display:flex;flex-wrap:wrap;gap:20px;align-items:center}
  .navy{background:var(--ecoteq-navy);padding:18px;border-radius:var(--radius-lg)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Logo, Overline, SectionHeading, ContactPill } = window.ECOTEQDesignSystem_fc88f8;
    const Mail = () => <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>;
    const Phone = () => <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg>;
    function Demo(){
      return (
        <div>
          <div className="group"><div className="lbl">Logo</div>
            <div className="row">
              <Logo tone="navy" size={34}/>
              <Logo tone="green" size={28}/>
              <Logo tone="navy" size={30} showWordmark={false}/>
              <div className="navy"><Logo tone="white" size={30}/></div>
            </div>
          </div>
          <div className="group"><div className="lbl">Overline & section heading</div>
            <SectionHeading overline="Megoldások" title="Ipari hulladékból érték" lead="A darálástól a brikettálásig — tervezhető, üzemeltethető, szervizelhető rendszerek."/>
          </div>
          <div className="group"><div className="lbl">Contact pills (on navy rail)</div>
            <div className="row navy">
              <ContactPill icon={<Mail/>} href="#">info@ecoteq.hu</ContactPill>
              <ContactPill icon={<Phone/>} href="#">+36 00 000 000</ContactPill>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body></html>
