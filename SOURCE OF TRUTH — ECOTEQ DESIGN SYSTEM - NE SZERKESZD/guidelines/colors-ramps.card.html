<!-- @dsCard group="02 · Colors" viewport="700x150" name="Brand ramps" subtitle="Navy & green ramps for depth, hover and press" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:20px;background:#fff}
  .stack{display:flex;flex-direction:column;gap:12px}
  .ramp{display:flex;gap:6px}
  .sw{flex:1;height:46px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:5px 7px}
  .lbl{font-size:10px;font-weight:var(--fw-bold)}
</style></head>
<body>
  <div class="stack">
    <div class="ramp">
      <div class="sw" style="background:var(--navy-900)"><span class="lbl" style="color:#fff">900</span></div>
      <div class="sw" style="background:var(--navy-800)"><span class="lbl" style="color:#fff">800</span></div>
      <div class="sw" style="background:var(--navy-700)"><span class="lbl" style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--navy-600)"><span class="lbl" style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--navy-500)"><span class="lbl" style="color:#fff">500</span></div>
    </div>
    <div class="ramp">
      <div class="sw" style="background:var(--green-700)"><span class="lbl" style="color:#fff">700</span></div>
      <div class="sw" style="background:var(--green-600)"><span class="lbl" style="color:#fff">600</span></div>
      <div class="sw" style="background:var(--green-500)"><span class="lbl" style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--green-400)"><span class="lbl" style="color:#fff">400</span></div>
      <div class="sw" style="background:var(--green-100)"><span class="lbl" style="color:var(--green-700)">100</span></div>
    </div>
  </div>
</body></html>
