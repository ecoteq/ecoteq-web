<!-- @dsCard group="02 · Colors" viewport="700x150" name="Brand colors" subtitle="Navy + green — the two brand colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:20px;background:#fff}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--color-border)}
  .chip{height:84px}
  .meta{padding:10px 12px}
  .name{font-weight:var(--fw-bold);font-size:var(--fs-sm);color:var(--color-text)}
  .hex{font-size:var(--fs-xs);color:var(--color-text-secondary);letter-spacing:.04em}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ecoteq-navy)"></div><div class="meta"><div class="name">ECOTEQ Navy</div><div class="hex">#1C3449 · --ecoteq-navy</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ecoteq-green)"></div><div class="meta"><div class="name">ECOTEQ Green</div><div class="hex">#43AD4D · --ecoteq-green</div></div></div>
    <div class="sw"><div class="chip" style="background:#fff;border-bottom:1px solid var(--color-border)"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF · --ecoteq-white</div></div></div>
  </div>
</body></html>
