<!-- @dsCard group="02 · Colors" viewport="700x150" name="Neutral scale" subtitle="Surfaces, borders and text grays" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:20px;background:#fff}
  .row{display:flex;gap:8px}
  .sw{flex:1;text-align:center}
  .chip{height:70px;border-radius:var(--radius-md);border:1px solid var(--color-border)}
  .name{margin-top:8px;font-size:11px;font-weight:var(--fw-bold);color:var(--color-text)}
  .hex{font-size:10px;color:var(--color-text-secondary)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gray-0)"></div><div class="name">gray-0</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="name">gray-100</div><div class="hex">#EEEDED</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="name">gray-200</div><div class="hex">#D9D9D9</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="name">gray-400</div><div class="hex">#9A9A9C</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="name">gray-700</div><div class="hex">#4D4D4F</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="name">gray-900</div><div class="hex">#262627</div></div>
  </div>
</body></html>
