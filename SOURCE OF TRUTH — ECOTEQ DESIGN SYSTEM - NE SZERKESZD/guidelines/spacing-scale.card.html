<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:22px;background:#fff;color:var(--color-text)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .c{text-align:center}
  .bar{background:var(--color-accent-tint);border:1px solid var(--green-400);border-radius:var(--radius-sm)}
  .l{margin-top:6px;font-size:10px;color:var(--color-text-secondary);font-weight:var(--fw-bold)}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="bar" style="width:4px;height:4px"></div><div class="l">1·4</div></div>
    <div class="c"><div class="bar" style="width:8px;height:8px"></div><div class="l">2·8</div></div>
    <div class="c"><div class="bar" style="width:12px;height:12px"></div><div class="l">3·12</div></div>
    <div class="c"><div class="bar" style="width:16px;height:16px"></div><div class="l">4·16</div></div>
    <div class="c"><div class="bar" style="width:24px;height:24px"></div><div class="l">5·24</div></div>
    <div class="c"><div class="bar" style="width:32px;height:32px"></div><div class="l">6·32</div></div>
    <div class="c"><div class="bar" style="width:48px;height:48px"></div><div class="l">7·48</div></div>
    <div class="c"><div class="bar" style="width:64px;height:64px"></div><div class="l">8·64</div></div>
  </div>
</body></html>
