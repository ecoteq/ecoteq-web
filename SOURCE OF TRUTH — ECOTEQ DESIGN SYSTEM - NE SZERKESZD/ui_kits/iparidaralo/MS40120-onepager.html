<!DOCTYPE html>
<html lang="hu" data-brand="iparidaralo" data-mode="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MS 40–120 egytengelyes ipari daráló — ECOTEQ</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);-webkit-font-smoothing:antialiased}
  .page{max-width:1180px;margin:0 auto}
  .sect{padding:96px 64px}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius-pill);white-space:nowrap;
    border:1px solid var(--color-border-strong);font-size:var(--fs-sm);font-weight:600;color:var(--color-text-secondary);background:var(--color-surface)}
  .idx{font-family:var(--font-display);font-weight:800;font-size:var(--fs-h3);color:var(--color-accent);letter-spacing:-.02em;line-height:1}
  .ov{font-size:var(--fs-xs);font-weight:700;letter-spacing:var(--ls-overline);text-transform:uppercase;color:var(--color-accent-text)}
  table{border-collapse:collapse;width:100%}
  .spec td{padding:14px 0;border-bottom:1px solid var(--color-divider);font-size:var(--fs-body);vertical-align:top}
  .spec td:first-child{color:var(--color-text-secondary);width:52%}
  .spec td:last-child{font-weight:700;text-align:right}
  @media print{
    @page{size:A4;margin:14mm}
    body{background:#fff}
    .sect{padding:28px 0}
    .no-print{display:none!important}
    .brk{break-before:page}
    .hero-photo{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Logo, Button, Tag, Card, StatBlock, Overline, SectionHeading } = window.ECOTEQDesignSystem_fc88f8;

const I = ({d,w=20}) => <svg viewBox="0 0 24 24" width={w} height={w} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const Arrow = () => <I d={<path d="M5 12h14M13 6l6 6-6 6"/>}/>;
const Check = () => <I d={<path d="M20 6 9 17l-5-5"/>}/>;
const Shield = () => <I d={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/></>}/>;
const Cog = () => <I d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></>}/>;
const Layers = () => <I d={<><path d="m12.83 2.18 8.04 4.02a1 1 0 0 1 0 1.6l-8.04 4.02a1 1 0 0 1-.66 0L4.13 7.8a1 1 0 0 1 0-1.6l8.04-4.02a1 1 0 0 1 .66 0Z"/><path d="m2.5 12 9.17 4.59a1 1 0 0 0 .66 0L21.5 12M2.5 17l9.17 4.59a1 1 0 0 0 .66 0L21.5 17"/></>}/>;
const Cpu = () => <I d={<><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></>}/>;
const Sliders = () => <I d={<><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></>}/>;
const Phone = () => <I d={<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/>}/>;
const Mail = () => <I d={<><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></>}/>;
const Quote = () => <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor"><path d="M9.5 6C6.5 6 4 8.5 4 11.5V18h7v-7H7.2c0-1.6 1.3-2.8 2.8-2.8V6Zm9 0C15.5 6 13 8.5 13 11.5V18h7v-7h-3.8c0-1.6 1.3-2.8 2.8-2.8V6Z"/></svg>;

const PHOTO = "../../assets/photos/";

function Stage({idx, over, title, lead, children, brk}) {
  return (
    <section className={"sect page" + (brk ? " brk" : "")}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
        <span className="idx">{idx}</span>
        <span style={{width:36,height:2,background:"var(--color-accent)"}}></span>
        <span className="ov">{over}</span>
      </div>
      {title && <h2 style={{margin:0,fontFamily:"var(--font-display)",fontWeight:800,fontSize:"var(--fs-h1)",lineHeight:"var(--lh-heading)",letterSpacing:"var(--ls-heading)",maxWidth:780}}>{title}</h2>}
      {lead && <p style={{margin:"16px 0 0",fontSize:"var(--fs-lg)",lineHeight:"var(--lh-body)",color:"var(--color-text-secondary)",maxWidth:680}}>{lead}</p>}
      {children}
    </section>
  );
}

function Header(){
  return (
    <header className="no-print" style={{position:"sticky",top:0,zIndex:30,background:"var(--color-header-bg)",backdropFilter:"blur(8px)",
      borderBottom:"1px solid var(--color-border)",display:"flex",alignItems:"center",gap:18,padding:"0 32px",height:70}}>
      <span style={{display:"inline-flex",alignItems:"center",gap:9}}>
        <Logo tone="navy" size={26} showWordmark={false}/>
        <span style={{fontFamily:"var(--font-display)",fontWeight:800,fontSize:20,letterSpacing:"-.01em"}}>iparidaralo<span style={{color:"var(--color-accent)"}}>.hu</span></span>
      </span>
      <span style={{color:"var(--color-border-strong)"}}>·</span>
      <span style={{fontSize:14,fontWeight:600,color:"var(--color-text-secondary)"}}>MS 40–120 egytengelyes daráló</span>
      <div style={{flex:1}}/>
      <Button variant="primary" size="sm" iconRight={<Arrow/>} onClick={()=>document.getElementById('cta').scrollIntoView()}>Ajánlatot kérek</Button>
    </header>
  );
}

function Hero(){
  return (
    <section style={{position:"relative",minHeight:620,display:"flex",alignItems:"center",overflow:"hidden",background:"var(--color-surface-dark)"}}>
      <div className="hero-photo" style={{position:"absolute",inset:0,background:`url(${PHOTO}shredder-ms40120-hero.jpg) center 40%/cover`}}/>
      <div style={{position:"absolute",inset:0,background:"var(--overlay-navy-side)"}}/>
      <div style={{position:"relative",padding:"0 64px",maxWidth:820}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
          <span style={{width:40,height:2,background:"var(--color-accent)"}}></span>
          <span style={{color:"#fff",fontSize:"var(--fs-xs)",fontWeight:700,letterSpacing:"var(--ls-overline)",textTransform:"uppercase",opacity:.92}}>Egytengelyes ipari daráló · ISVE</span>
        </div>
        <h1 style={{color:"#fff",fontFamily:"var(--font-display)",fontSize:"var(--fs-display)",lineHeight:"var(--lh-tight)",letterSpacing:"var(--ls-display)",margin:0,fontWeight:800}}>
          Ami másnak<br/>hulladék, itt<br/><span style={{color:"var(--color-accent)"}}>alapanyag lesz.</span>
        </h1>
        <p style={{color:"rgba(255,255,255,0.88)",fontSize:"var(--fs-lg)",lineHeight:"var(--lh-body)",maxWidth:560,marginTop:22}}>
          Az MS 40–120 a legkeményebb ipari hulladékot is megbízhatóan aprítja — 55 kW, hidraulikus előtolással, óránként akár 2 500 kg. Egy gép, ami éveken át, műszakról műszakra dolgozik.
        </p>
        <div style={{marginTop:32}}>
          <Button variant="primary" size="lg" iconRight={<Arrow/>} onClick={()=>document.getElementById('cta').scrollIntoView()}>Ajánlatot kérek</Button>
        </div>
      </div>
    </section>
  );
}

function KPI(){
  const kpis=[
    {value:"55",suffix:"kW",label:"névleges motorteljesítmény"},
    {value:"1800–2500",suffix:"kg/h",label:"feldolgozó kapacitás"},
    {value:"Ø400",suffix:"×1200 mm",label:"rotor átmérő × hossz"},
    {value:"5500",suffix:"kg",label:"robusztus géptömeg"},
  ];
  return (
    <section style={{background:"var(--color-surface-dark)",padding:"56px 64px"}}>
      <div className="page" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:40}}>
        {kpis.map(k=><StatBlock key={k.label} tone="dark" value={k.value} suffix={k.suffix} label={k.label}/>)}
      </div>
    </section>
  );
}

function Application(){
  const mats=["Fa és fadarabok","Vastag / ömlesztett műanyag","Papír","Bizalmas dokumentumok","Préselt lemezek","Kisebb gumihulladék"];
  return (
    <Stage idx="01" over="Alkalmazás" title="Egy daráló a sokféle, nehéz hulladékhoz"
      lead="Az erős, masszív szerkezet valódi ipari igénybevételre készült. Az elektromotoros hajtás mellett kiegészítő hidraulikus rendszer tolja az alapanyagot a forgó rotorra — folyamatos, egyenletes darálás még nagy szilárdságú anyagból is. A végszemcsét egyszerűen cserélhető rostával állítja a feladathoz.">
      <div style={{display:"flex",flexWrap:"wrap",gap:12,marginTop:36}}>
        {mats.map(m=><span key={m} className="chip"><span style={{color:"var(--color-accent)",display:"inline-flex"}}><Check/></span>{m}</span>)}
      </div>
    </Stage>
  );
}

function DetailCard({icon,kicker,title,children}){
  return (
    <Card padding={32} style={{display:"flex",flexDirection:"column",gap:14,height:"100%",boxSizing:"border-box"}}>
      <span style={{width:48,height:48,borderRadius:"var(--radius-md)",background:"var(--color-accent-tint)",color:"var(--color-accent)",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>{icon}</span>
      <div>
        <div className="ov" style={{marginBottom:6}}>{kicker}</div>
        <h3 style={{margin:0,fontSize:"var(--fs-h4)",fontWeight:700}}>{title}</h3>
      </div>
      <p style={{margin:0,color:"var(--color-text-secondary)",fontSize:"var(--fs-body)",lineHeight:"var(--lh-snug)"}}>{children}</p>
    </Card>
  );
}

function Construction(){
  return (
    <Stage idx="02" over="Felépítés" title="Ott erős, ahol számít">
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:24,marginTop:40}}>
        <DetailCard icon={<Cog/>} kicker="Rotor & kések" title="Négyszer átfordítható vágóélek">
          Ø400 mm átmérőjű, 1200 mm hosszú tömör tengely, 55 db extrém kopásálló ötvözet vágószerszámmal és 2 ellenkéssel. Minden kés négyszer fordítható — kevesebb állásidő, hosszabb élettartam.
        </DetailCard>
        <DetailCard icon={<Sliders/>} kicker="Hidraulikus előtoló" title="Egyenletes, automatikus adagolás">
          850 mm-es előtoló egység PLC-szabályozású hidraulikával, külön 5,5 kW-os motorral, túlmelegedés ellen termosztáttal és hűtővel. A rotor mindig optimális terhelésen dolgozik.
        </DetailCard>
        <DetailCard icon={<Layers/>} kicker="Cserélhető rosta" title="Egy gép, sokféle végszemcse">
          14 · 16 · 20 · 25 · 30 · 35 mm rostaméret a darált anyag pontos méretezéséhez — opcióként 50 mm és 14 mm alatti finomító. Gyors, szerszám-takarékos csere.
        </DetailCard>
        <DetailCard icon={<Cpu/>} kicker="Vezérlés" title="SIEMENS LOGO PLC, védelmekkel">
          CEE-szabványos túláram-védelmű vezérlőszekrény, ami a be- és kihordó berendezést is vezérli. Idegen anyag és elakadás elleni védelem, biztonsági leállító funkciók.
        </DetailCard>
      </div>
    </Stage>
  );
}

function Specs(){
  const rows=[
    ["Névleges teljesítmény","55 kW"],
    ["Hidraulikus egység","5,5 kW"],
    ["Meghajtás","szíj + hajtómű"],
    ["Vágótengelyek száma","1 db"],
    ["Rotor átmérő × hossz","400 × 1200 mm"],
    ["Vágókések a tengelyen","55 db"],
    ["Fordulatszám","85 / perc"],
    ["Feldolgozó kapacitás","1 800–2 500 kg/óra"],
    ["Darálótér keresztmetszete","1200 × 1300 mm"],
    ["Tömeg","5 500 kg"],
    ["Biztonsági felszerelés","vészleállítók, reteszelések"],
    ["Származási hely","Olaszország (ISVE)"],
    ["Megfelelőség","CE"],
  ];
  const opts=["Egyedi geometriájú betöltő garat","Finomító 14 mm alatti igényre","Be- és kihordó szalag vagy elszívó rendszer","Egyedi csomagolási megoldás","Egyedi alaprajzi méret"];
  return (
    <Stage idx="03" over="Műszaki adatok" title="Minden szám, egy helyen" brk>
      <div style={{display:"grid",gridTemplateColumns:"1.25fr 1fr",gap:56,marginTop:40,alignItems:"start"}}>
        <table className="spec"><tbody>
          {rows.map(r=><tr key={r[0]}><td>{r[0]}</td><td>{r[1]}</td></tr>)}
        </tbody></table>
        <div>
          <div className="ov" style={{marginBottom:16}}>Opcionális tartozékok</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {opts.map(o=>(
              <div key={o} style={{display:"flex",gap:11,alignItems:"flex-start"}}>
                <span style={{color:"var(--color-accent)",marginTop:2,display:"inline-flex"}}><Check/></span>
                <span style={{fontSize:"var(--fs-body)",lineHeight:"var(--lh-snug)"}}>{o}</span>
              </div>
            ))}
          </div>
          <p style={{marginTop:20,fontSize:"var(--fs-sm)",color:"var(--color-text-muted)",lineHeight:"var(--lh-snug)"}}>A kapacitásadatok tájékoztató jellegűek. Egy darab rosta alaptartozék.</p>
        </div>
      </div>
    </Stage>
  );
}

function Proof(){
  const marks=[
    {t:"CE megfelelőség",d:"Európai szabványok szerint"},
    {t:"Olasz gyártmány",d:"ISVE — bevált présgyártó"},
    {t:"Magyar szerviz",d:"dokumentáció és támogatás"},
    {t:"Idegenanyag-védelem",d:"elakadás- és túláram-védelem"},
  ];
  return (
    <section style={{background:"var(--color-surface-dark)",padding:"88px 64px"}}>
      <div className="page" style={{display:"grid",gridTemplateColumns:"1.1fr 1fr",gap:64,alignItems:"center"}}>
        <div>
          <span style={{color:"var(--color-accent)",display:"inline-flex"}}><Quote/></span>
          <p style={{color:"#fff",fontFamily:"var(--font-display)",fontWeight:700,fontSize:"var(--fs-h3)",lineHeight:"var(--lh-snug)",letterSpacing:"-.01em",margin:"10px 0 0"}}>
            „Nem gépet adunk el, hanem megoldást — a projektötlettől a beüzemelt, működő darálóig végigvisszük Önnel."
          </p>
          <div style={{marginTop:20,color:"rgba(255,255,255,0.7)",fontSize:"var(--fs-sm)",fontWeight:600,letterSpacing:".02em"}}>ECOTEQ mérnöki csapat</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
          {marks.map(m=>(
            <div key={m.t} style={{padding:"20px",borderRadius:"var(--radius-lg)",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)"}}>
              <span style={{color:"var(--color-accent)",display:"inline-flex"}}><Shield/></span>
              <div style={{color:"#fff",fontWeight:700,fontSize:"var(--fs-body)",marginTop:10}}>{m.t}</div>
              <div style={{color:"rgba(255,255,255,0.62)",fontSize:"var(--fs-sm)",marginTop:3}}>{m.d}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function CTA(){
  return (
    <section id="cta" style={{background:"var(--color-accent)",padding:"80px 64px"}}>
      <div className="page" style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:40,flexWrap:"wrap"}}>
        <div>
          <h2 style={{margin:0,color:"var(--color-on-accent)",fontFamily:"var(--font-display)",fontWeight:800,fontSize:"var(--fs-h1)",letterSpacing:"-.01em",lineHeight:1.05}}>
            Méretezzük az Ön hulladékára.
          </h2>
          <p style={{margin:"14px 0 0",color:"var(--color-on-accent)",opacity:.82,fontSize:"var(--fs-lg)",maxWidth:560}}>
            Küldje el az alapanyagot és a kívánt volument — 24 órán belül géptervvel és ár-becsléssel jelentkezünk.
          </p>
        </div>
        <a href="mailto:info@ecoteq.hu?subject=MS%2040-120%20aj%C3%A1nlatk%C3%A9r%C3%A9s" style={{flex:"none",background:"var(--color-on-accent)",color:"var(--color-accent)",
          textDecoration:"none",whiteSpace:"nowrap",borderRadius:"var(--radius-pill)",padding:"18px 36px",fontWeight:700,fontSize:"var(--fs-lg)",display:"inline-flex",alignItems:"center",gap:11}}>
          Ajánlatot kérek <span style={{display:"inline-flex"}}><Arrow/></span>
        </a>
      </div>
    </section>
  );
}

function Footer(){
  return (
    <footer style={{background:"var(--color-feature-deep, var(--color-surface-dark))",color:"rgba(255,255,255,0.7)",padding:"56px 64px"}}>
      <div className="page" style={{display:"flex",justifyContent:"space-between",gap:48,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div style={{maxWidth:340}}>
          <span style={{display:"inline-flex",alignItems:"center",gap:9}}>
            <Logo tone="white" size={28} showWordmark={false}/>
            <span style={{fontFamily:"var(--font-display)",fontWeight:800,fontSize:21,color:"#fff"}}>iparidaralo<span style={{color:"var(--color-accent)"}}>.hu</span></span>
          </span>
          <p style={{marginTop:14,fontSize:14,lineHeight:1.6}}>Az ECOTEQ ipari darálási üzletága. Szakértő támogatás a projektötlettől a megvalósításig.</p>
        </div>
        <div style={{fontSize:14,lineHeight:1.9}}>
          <div style={{color:"#fff",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",fontSize:12,marginBottom:8}}>ECOTEQ Kereskedelmi és Tanácsadó Kft.</div>
          <div>1037 Budapest, Csillaghegyi út 19–21.</div>
          <div style={{display:"flex",gap:18,margintop:4,flexWrap:"wrap"}}><span style={{display:"inline-flex",alignItems:"center",gap:7}}><Phone/>+36 (1) 430-1556</span><span style={{display:"inline-flex",alignItems:"center",gap:7}}><Mail/>info@ecoteq.hu</span></div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginTop:10}}>Cégjegyzékszám 01-09-820953 · Adószám 14145977-2-41</div>
        </div>
      </div>
      <div className="page" style={{marginTop:32,paddingTop:20,borderTop:"1px solid rgba(255,255,255,0.1)",fontSize:12,color:"rgba(255,255,255,0.5)"}}>© 2026 ECOTEQ Kft. — MS 40–120 terméklap. A műszaki adatok tájékoztató jellegűek, a változtatás jogát fenntartjuk.</div>
    </footer>
  );
}

function App(){
  return <>
    <Header/>
    <Hero/>
    <KPI/>
    <Application/>
    <Construction/>
    <Specs/>
    <Proof/>
    <CTA/>
    <Footer/>
  </>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
